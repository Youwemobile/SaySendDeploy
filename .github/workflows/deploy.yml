name: 'Deploy Platform Components'

on:
  repository_dispatch:
    types: [deploy-services]

concurrency:
  group: deployment-${{ github.event.client_payload.is_prod == 'true' && 'prod' || github.event.client_payload.image_tag }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: main
      ENV_NAME: prod
      NAMESPACE: saysend-prod
    steps:
    - name: Checkout infrastructure repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: 'main'

    - name: Prepare Stage Branch & Environment
      if: github.event.client_payload.is_prod != 'true'
      run: |
        GIT_REF="${{ github.event.client_payload.ref_name }}"
        IMAGE_TAG="${{ github.event.client_payload.image_tag }}"
        echo "TARGET_BRANCH=${GIT_REF}" >> $GITHUB_ENV
        echo "ENV_NAME=stage" >> $GITHUB_ENV
        echo "NAMESPACE=saysend-${IMAGE_TAG}" >> $GITHUB_ENV
        if git ls-remote --exit-code --heads origin "$GIT_REF"; then
          git fetch origin "$GIT_REF":refs/remotes/origin/"$GIT_REF"
          git checkout "$GIT_REF"
        else
          git checkout -b "$GIT_REF"
        fi

    - name: Install yq
      uses: mikefarah/yq@v4.44.1

    - name: Update Microservices Image Tags
      run: |
        TAG="${{ github.event.client_payload.image_tag }}"
        yq -i "
          .auth-service.image.tag = \"${TAG}\" |
          .transcription-service.image.tag = \"${TAG}\" |
          .translation-service.image.tag = \"${TAG}\" |
          .billing-service.image.tag = \"${TAG}\"
        " ./components/apps/values.yaml

        FULL_SHA="${{ github.event.client_payload.commit_sha }}"
        echo "SHORT_SHA=${FULL_SHA:0:7}" >> $GITHUB_ENV

    - name: Bump Chart and App Versions (Prod Only)
      if: env.ENV_NAME == 'prod'
      run: |
        TAG="${{ github.event.client_payload.image_tag }}"
        APPS_CHART="./components/apps/Chart.yaml"
        yq -i ".appVersion = \"${TAG}\"" "${APPS_CHART}"
        yq -i '.version = (.version | split(".") | .[-1] |= ((. | to_number) + 1 | to_string) | join("."))' "${APPS_CHART}"

    - name: Update Stage Dynamic Domain
      if: env.ENV_NAME == 'stage'
      run: |
        TARGET_DOMAIN="${{ env.NAMESPACE }}.k8s-dev.saysend.me"
        yq -i ".ingress.host = \"${TARGET_DOMAIN}\"" ./components/infra/values.yaml

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Deploy ${{ github.event.client_payload.ref_name }}:${{ env.SHORT_SHA }} to ${{ env.NAMESPACE }}"
        file_pattern: 'components/**/*.yaml'
        branch: ${{ env.TARGET_BRANCH }}
        create_branch: true
        skip_dirty_check: true
        commit_options: '--allow-empty'

    - name: Setup Kubernetes Environment
      uses: ./.github/actions/k8s-env-setup
      with:
        kubeconfig_base64: ${{ env.ENV_NAME == 'prod' && secrets.PROD_KUBECONFIG_DATA || secrets.STAGE_KUBECONFIG_DATA }}
        namespace: ${{ env.NAMESPACE }}
        nexus_docker_config_base64: ${{ secrets.NEXUS_DOCKER_CONFIG }}

    - name: Deploy Infrastructure
      if: env.ENV_NAME == 'stage'
      run: |
        helm upgrade --install infra ./components/infra \
          -f ./components/infra/values.yaml \
          --namespace ${{ env.NAMESPACE }} --create-namespace

    - name: Deploy Applications
      env:
        ELEVENLABS_API_KEY: ${{ env.ENV_NAME == 'prod' && secrets.PROD_ELEVENLABS_API_KEY || secrets.STAGE_ELEVENLABS_API_KEY }}
        OPENAI_API_KEY: ${{ env.ENV_NAME == 'prod' && secrets.PROD_OPENAI_API_KEY || secrets.STAGE_OPENAI_API_KEY }}
        JWT_SECRET_KEY: ${{ env.ENV_NAME == 'prod' && secrets.PROD_JWT_SECRET_KEY || secrets.STAGE_JWT_SECRET_KEY }}
      run: |
        CURRENT_DATE=$(date +%s)
        helm dependency build ./components/apps
        helm upgrade --install app ./components/apps \
          -f ./components/apps/values.yaml \
          -f ./components/apps/environments/${{ env.ENV_NAME }}.yaml \
          --set "global.deployDate=${CURRENT_DATE}" \
          --set "global.secrets.ELEVENLABS_API_KEY=${{ env.ELEVENLABS_API_KEY }}" \
          --set "global.secrets.JWT_SECRET_KEY=${{ env.JWT_SECRET_KEY }}" \
          --set "global.secrets.OPENAI_API_KEY=${{ env.OPENAI_API_KEY }}" \
          --namespace ${{ env.NAMESPACE }} --create-namespace

    - name: Cleanup Kubeconfig
      if: always()
      uses: ./.github/actions/k8s-cleanup
