{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fastapi-base.name" . }}-migrate-{{ .Release.Revision }}
  labels:
    app: {{ include "fastapi-base.name" . }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "55"
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: {{ include "fastapi-base.name" . }}-migrate
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: nexus-registry-key
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
{{- end }}
