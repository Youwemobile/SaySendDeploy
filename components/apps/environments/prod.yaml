docs:
  enabled: false

auth-service:
  env:
    - name: DB_HOST
      value: "prod-db-cluster.internal"
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.prod
          key: db_username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.prod
          key: db_password
    - name: BILLING_SERVICE_URL
      value: "http://billing-service"
    - name: APPLE_AUDIENCES
      value: '["net.liquidgears.saysend"]'
    - name: GOOGLE_CLIENT_IDS
      value: |-
        [
        "229973251056-hug8usodqtmu6tbafarv13lbppccskk6.apps.googleusercontent.com",
        "2229973251056-0t52oi7cr5o15f75pb393ne1opbloeno.apps.googleusercontent.com",
        "2229973251056-3pq8pktqt8gcuu49e2jde8m65i98f9jm.apps.googleusercontent.com"
        ]
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.prod
          key: jwt_secret_key

