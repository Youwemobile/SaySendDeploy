docs:
  enabled: true

auth-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "auth"
    - name: BILLING_SERVICE_URL
      value: "http://billing-service"
    # TODO: required setting, no app default — trim to just
    # "net.liquidgears.saysend" once callers stop sending the legacy audiences
    - name: APPLE_AUDIENCES
      value: '["net.liquidgears.saysend", "ss.saySend", "net.liquidgears.saysendMac"]'
    - name: GOOGLE_CLIENT_IDS
      value: >-
        [
        "229973251056-hug8usodqtmu6tbafarv13lbppccskk6.apps.googleusercontent.com",
        "2229973251056-0t52oi7cr5o15f75pb393ne1opbloeno.apps.googleusercontent.com",
        "2229973251056-3pq8pktqt8gcuu49e2jde8m65i98f9jm.apps.googleusercontent.com"
        ]
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key

transcription-service:
  env:
    - name: REDIS_HOST
      value: "infra-redis"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: openai_api_key
    - name: ELEVENLABS_API_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: elevenlabs_api_key

translation-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "translation"
    - name: REDIS_HOST
      value: "infra-redis"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: openai_api_key

billing-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "billing"
    - name: REDIS_HOST
      value: "infra-redis"
    - name: APPLE_APP_APPLE_ID
      value: "6775735588"
    - name: APPLE_ENVIRONMENT
      value: "Sandbox"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key
