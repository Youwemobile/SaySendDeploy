docs:
  enabled: true

auth-service:
  secrets:
    - JWT_SECRET_KEY
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "auth"

translation-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "translation"
