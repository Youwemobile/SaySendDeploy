docs:
  enabled: true

auth-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "auth"
    - name: BILLING_SERVICE_URL
      value: "http://billing-service"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key

transcription-service:
  env:
    - name: REDIS_HOST
      value: "infra-redis"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: openai_api_key
    - name: ELEVENLABS_API_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: elevenlabs_api_key

translation-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "translation"
    - name: REDIS_HOST
      value: "infra-redis"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: openai_api_key

billing-service:
  env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: saysend.infra-pg.credentials.postgresql.acid.zalan.do
          key: password
    - name: DB_HOST
      value: "infra-pg"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "billing"
    - name: REDIS_HOST
      value: "infra-redis"
    - name: APPLE_APP_APPLE_ID
      value: "0" # TODO: real App Store Connect numeric app id
    - name: APPLE_ENVIRONMENT
      value: "Sandbox"
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: saysend.stage
          key: jwt_secret_key
